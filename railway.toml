[build]
builder = "NIXPACKS"

[build.nixpacks]
setupPhase = { cmd = "composer install && npm install" }
buildPhase = { cmd = "npm run build" }

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"

[deploy]
preDeployCommand = "php artisan migrate --force && php artisan db:seed --force"

[env]
NODE_ENV = "production"
